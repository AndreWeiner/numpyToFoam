name: numpyToFoamTest

on:
  push:
  pull_request:

jobs:
  run-apptainer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Apptainer
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:apptainer/ppa
          sudo apt-get update
          sudo apt-get install -y apptainer

      - name: Check Apptainer
        run: |
          apptainer --version

      - name: Run numpyToFoam unit test
        run: |
          chmod +x unittest/actions_unittest.sh
          bash unittest/actions_unittest.sh
