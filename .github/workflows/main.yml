name: numpyToFoamTest

on:
  push:
  pull_request:

jobs:
  run-apptainer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Apptainer
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:apptainer/ppa
          sudo apt-get update
          sudo apt-get install -y apptainer

      - name: Pull Apptainer image from GHCR
        run: |
          apptainer pull openfoam2112.sif oras://ghcr.io/tanujravi/openfoam2112:default

      - name: Test image
        run: |
          apptainer exec openfoam2112.sif bash -lc '
            echo "Inside Apptainer image"
            source /usr/lib/openfoam/openfoam2112/etc/bashrc
            echo "OpenFOAM version: $WM_PROJECT_VERSION"
          '
